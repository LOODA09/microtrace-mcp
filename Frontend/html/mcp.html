    <link rel="stylesheet" href="../css/mcpanimation.css" />
  </head>
  <body data-light-theme="false" data-theme="dark">
    <!-- Sidebar Navigation (60px icon only) -->
    <aside class="sidebar-nav-main">
      <div class="sidebar-nav-header">
        <a href="../index.html">
          <img src="../assets/pictures/MicroTrace_Logo.png" alt="MicroTrace Logo" class="logo" />

      </div>
      <nav class="sidebar-nav-links">
        <a href="../index.html" title="Home">🏠</a>

        <a href="dashboard.html" title="Dashboard">📊</a>
        <a href="mcp.html" class="active" title="MCP">🤖</a>
      </nav>
      <div class="sidebar-nav-footer">
        <a href="about.html" title="About">ℹ️</a>
        <button id="themeSwitch" class="theme-toggle" title="Toggle Theme">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
        <button class="icon-button" id="togglePanelBtn" title="Tools">🔧</button>
        <a href="settings.html" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">

          </svg>
        </a>
      </div>
    </aside>

    <!-- Chat History Sidebar (Right of Navigation) -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <span style="font-size: 1.1rem;">+</span>
          <span>New Chat</span>
        </button>
        <div class="connection-status disconnected" id="connectionStatus">
          <span class="status-dot"></span>
          <span id="statusText">Disconnected</span>
        </div>
      </div>
      <div class="chat-history" id="chatHistory"></div>
      <div class="sidebar-footer">
        <div class="api-status" id="apiStatus">API: Not connected</div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-container" id="chatContainer">
      <div class="chat-header">
        <div class="header-left">
          <button class="toggle-sidebar-btn" id="toggleSidebarBtn">☰</button>
          <div class="header-actions">
            <button class="icon-button" id="exportChatBtn" title="Export">📥</button>
            <button class="icon-button" id="connectBtn" title="Connect to MCP Server">🔌</button>
            <button class="icon-button" id="clearChatBtn" title="Clear Chat">🗑️</button>
          </div>
        </div>
        <!-- MicroTrace AI with RGB animation - centered -->
        <div class="header-brand">
          <span class="header-brand-text">MicroTrace AI</span>
        </div>
        <div class="header-right">
          <!-- Profile Bubble with Dropdown - dropdown is SIBLING, not child -->
          <div class="header-profile">
            <div class="profile-bubble" id="profileBubble" title="Profile">
              <span id="profileInitials">U</span>
            </div>
            <div class="profile-dropdown" id="profileDropdown">
              <div class="profile-dropdown-header">
                <div class="profile-dropdown-name" id="profileName">User</div>
                <div class="profile-dropdown-email" id="profileEmail">user@example.com</div>
              </div>
              <div class="profile-dropdown-menu">
                <div class="profile-dropdown-item" id="editProfileBtn">
                  <span>👤</span>
                  <span>Edit Profile</span>
                </div>
                <div class="profile-dropdown-item danger" id="logoutBtn">
                  <span>🚪</span>
                  <span>Logout</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="messages-wrapper" id="messagesWrapper">
          <div class="welcome-screen" id="welcomeScreen">
            <div class="robot-container">
              <div class="robot-head">
                <div class="antenna"></div>
                <div class="robot-eyes">
                  <div class="eye"></div>
                  <div class="eye"></div>
                </div>
                <div class="robot-mouth">
                  <div class="mouth-line"></div>
                  <div class="mouth-line"></div>
                  <div class="mouth-line"></div>
                </div>
              </div>
              <div class="logo-text">MicroTrace AI</div>
            </div>
          </div>
        </div>
      </div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="message-avatar">AI</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <input type="file" id="fileInput" accept=".pdf,.txt,.doc,.docx" multiple>
          <button class="file-upload-btn" id="fileUploadBtn" title="Upload files">📎</button>
          <textarea id="messageInput" placeholder="Ask about STM32 registers..." rows="1" maxlength="4000"></textarea>
          <button class="deep-search-button" id="deepSearchButton" title="Deep Search" disabled></button>
          <button class="send-button" id="sendButton" disabled>➤</button>
        </div>
      </div>
    </main>

    <!-- Quick Tools Panel -->
    <div class="quick-tools-panel" id="quickToolsPanel">
      <div class="panel-header">
        <h2 class="panel-title">Quick Tools</h2>
        <button class="toggle-panel-btn" id="togglePanelBtn">☰</button>
      </div>
      <div class="panel-tools-container">
        <div class="panel-tools-grid">
          <button class="panel-tool-btn" id="extractRegisterBtn" data-tool="extract">
            <span class="panel-tool-icon">📄</span>
            <span class="panel-tool-name">Extract Registers</span>
          </button>
          <button class="panel-tool-btn" id="searchRegisterBtn" data-tool="search">
            <span class="panel-tool-icon">🔍</span>
            <span class="panel-tool-name">Search Register</span>
          </button>
          <button class="panel-tool-btn" id="getRegisterBtn" data-tool="get">
            <span class="panel-tool-icon">📋</span>
            <span class="panel-tool-name">Get Register</span>
          </button>
          <button class="panel-tool-btn" id="extractImagesBtn" data-tool="images">
            <span class="panel-tool-icon">🖼️</span>
            <span class="panel-tool-name">Extract Images</span>
          </button>
          <button class="panel-tool-btn" id="getPdfTitlesBtn" data-tool="titles">
            <span class="panel-tool-icon">📖</span>
            <span class="panel-tool-name">PDF Titles</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
      <button class="context-menu-item" id="copyTextBtn">📋 Copy</button>
      <button class="context-menu-item" id="askChatBtn">💬 Ask Chat</button>
    </div>
